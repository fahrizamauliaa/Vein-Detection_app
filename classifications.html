<!doctype html>
<html class="no-js" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Vein Detection Admin - HTML5 Admin Template</title>
    <meta name="description" content="Vein Admin - HTML5 Admin Template">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon_io/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon_io/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon_io/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon_io/site.webmanifest') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/normalize.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/fontawesome-free-7.0.1-web/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/themify-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/flag-icon.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/cs-skin-elastic.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='veindetection/assets/widgets.css') }}">
    <link href="{{ url_for('static', filename='veindetection/assets/vector-map/jqvmap.min.css') }}" rel="stylesheet">

    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,600,700,800' rel='stylesheet' type='text/css'>
    <style>
        .card-body {
            padding: 20px;
        }
        #image {
            margin: 0 auto;
            display: block;
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
        }
        .result-table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .result-table th, .result-table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .result-table th {
            background-color: #f8f9fa;
        }
        .text-center {
            text-align: center !important;
        }
        .card-body .text-center {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <!-- Left Panel -->
    <aside id="left-panel" class="left-panel">
        <nav class="navbar navbar-expand-sm navbar-default">
            <div class="navbar-header">
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#main-menu" aria-controls="main-menu" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fa fa-bars"></i>
                </button>
                <a class="navbar-brand" href="./"><img src="{{ url_for('static', filename='veindetection/assets/images/logo.png') }}" alt="Logo"></a>
                <a class="navbar-brand hidden" href="./"><img src="{{ url_for('static', filename='veindetection/assets/images/logo2.png') }}" alt="Logo"></a>
            </div>

            <div id="main-menu" class="main-menu collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li>
                        <a href="{{ url_for('main') }}"> <i class="menu-icon fa fa-fort-awesome"></i>CNN Model </a>
                    </li>
                    <li>
                        <a href="{{ url_for('classification') }}"> <i class="menu-icon fa fa-image"></i>Image Classification </a>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>

    <div id="right-panel" class="right-panel">
        <header id="header" class="header">
            <div class="header-menu">
                <div class="col-sm-7">
                    <a id="menuToggle" class="menutoggle pull-left"><i class="fa fa fa-tasks"></i></a>
                    <div class="header-left"></div>
                </div>
                <div class="col-sm-5">
                    <div class="user-area dropdown float-right">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <img class="user-avatar rounded-circle" src="{{ url_for('static', filename='veindetection/assets/images/admin.jpg') }}" alt="User Avatar">
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content mt-3">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Input Image</h4>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" action="/submit" method="post" enctype="multipart/form-data">
                            <div class="row form-group">
                                <div class="col col-md-3"><label for="file-input" class="form-control-label">File input</label></div>
                                <div class="col-12 col-md-9"><input type="file" id="file" name="file" class="form-control-file" required></div>
                            </div>
                            <div class="row form-group">
                                <div class="col col-md-3"><label for="name-input" class="form-control-label">Name</label></div>
                                <div class="col-12 col-md-9"><input type="text" id="name" name="name" class="form-control" placeholder="Enter name" required></div>
                            </div>
                            <div class="row form-group">
                                <div class="col col-md-3"><label for="age-input" class="form-control-label">Age</label></div>
                                <div class="col-12 col-md-9"><input type="number" id="age" name="age" class="form-control" placeholder="Enter age" required></div>
                            </div>
                            <div class="row form-group">
                                <div class="col col-md-3"><label for="bmi-input" class="form-control-label">BMI</label></div>
                                <div class="col-12 col-md-9"><input type="number" step="0.1" id="bmi" name="bmi" class="form-control" placeholder="Enter BMI" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-3" style="margin-left: 15px;"></div>
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Classification Result</h4>
                    </div>
                    <div class="card-body text-center">
                        <img id="image" src="" alt="gambar prediksi" style="display: none;">
                        <table class="result-table" id="resultTable" style="display: none; margin-top: 20px;">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>BMI</th>
                                    <th>Model</th>
                                    <th>Prediction</th>
                                    <th>Confidence</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr id="rowVgg16">
                                    <td id="patientName"></td>
                                    <td id="patientAge"></td>
                                    <td id="patientBmi"></td>
                                    <td>CNN add Model VGG16</td>
                                    <td id="predictionvgg16"></td>
                                    <td id="confidencevgg16"></td>
                                </tr>
                                <tr id="rowXception">
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                    <td>CNN add Model Xception</td>
                                    <td id="predictionxception"></td>
                                    <td id="confidencexception"></td>
                                </tr>
                                <tr id="rowNasnet">
                                    <td></td>
                                    <td></td>
                                    <td></td>
                                    <td>CNN add Model NASNetMobile</td>
                                    <td id="predictionnasnet"></td>
                                    <td id="confidencenasnet"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='veindetection/assets/js/jquery-3.7.1.min.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.3/umd/popper.min.js"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/bootstrap-5.3.8-dist/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/js/plugins.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/charts-js/Chart.bundle.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/js/widgets.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/vector-map/jquery.vmap.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/vector-map/jquery.vmap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/vector-map/jquery.vmap.sampledata.js') }}"></script>
    <script src="{{ url_for('static', filename='veindetection/assets/vector-map/jquery.vmap.world.js') }}"></script>
    <script>
        (function ($) {
            "use strict";
            jQuery('#vmap').vectorMap({
                map: 'world_en',
                backgroundColor: null,
                color: '#ffffff',
                hoverOpacity: 0.7,
                selectedColor: '#1de9b6',
                enableZoom: true,
                showTooltip: true,
                values: sample_data,
                scaleColors: ['#1de9b6', '#03a9f5'],
                normalizeFunction: 'polynomial'
            });
        })(jQuery);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const form = document.getElementById("uploadForm");
        const image = document.getElementById("image");
        const patientName = document.getElementById("patientName");
        const patientAge = document.getElementById("patientAge");
        const patientBmi = document.getElementById("patientBmi");
        const predictionnasnet = document.getElementById("predictionnasnet");
        const confidencenasnet = document.getElementById("confidencenasnet");
        const predictionvgg16 = document.getElementById("predictionvgg16");
        const confidencevgg16 = document.getElementById("confidencevgg16");
        const predictionxception = document.getElementById("predictionxception");
        const confidencexception = document.getElementById("confidencexception");
        const resultTable = document.getElementById("resultTable");
        const rowVgg16 = document.getElementById("rowVgg16");
        const rowXception = document.getElementById("rowXception");
        const rowNasnet = document.getElementById("rowNasnet");

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            axios.post("/submit", formData, {
                headers: { "Content-Type": "multipart/form-data" },
            }).then((res) => {
                const data = res.data.data;
                image.src = data.filename;
                image.style.display = 'block';

                patientName.textContent = data.patient_info.name || "Not provided";
                patientAge.textContent = data.patient_info.age || "Not provided";
                patientBmi.textContent = data.patient_info.bmi || "Not provided";

                predictionvgg16.textContent = data.predictionvgg16;
                confidencevgg16.textContent = data.confidencevgg16;
                rowVgg16.style.display = 'table-row';

                predictionxception.textContent = data.predictionxception;
                confidencexception.textContent = data.confidencexception;
                rowXception.style.display = 'table-row';

                predictionnasnet.textContent = data.predictionnasnet;
                confidencenasnet.textContent = data.confidencenasnet;
                rowNasnet.style.display = 'table-row';

                resultTable.style.display = 'table';
            }).catch((err) => {
                console.error(err);
                alert('Error: ' + (err.response?.data?.message || 'Unknown error'));
            });
        });
    </script>
</body>
</html>
